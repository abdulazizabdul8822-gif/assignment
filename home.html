<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issues Tracker</title>


    <!-- Tailwind & daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- font Family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: "Geist", sans-serif;

        }
    </style>

</head>

<body class="bg-gray-100">

    <!-- Navbar -->

    <nav class="bg-white shadow p-4 flex justify-between">

        <div class="flex gap-2 items-center">
            <img src="./assets/github-logo.png" alt="" class="w-6">
            <h2 class="font-bold text-xl">GitHub Issues Tracker</h2>
        </div>

        <div class="flex gap-2">
            <input id="searchInput" type="text" placeholder="Search issues" class="border px-3 py-1 rounded">

            <button onclick="searchBar()" class="btn btn-primary btn-sm">
                Search
            </button>
        </div>

    </nav>


    <!-- Tabs -->

    <section class="max-w-6xl mx-auto mt-8 bg-white shadow p-4">

        <div class=" flex items-center  gap-3">

            <button id="allBtn" onclick="filterIssues('all')" class="tabBtn bg-blue-600 text-white px-6 py-2 rounded">
                All
            </button>

            <button id="openBtn" onclick="filterIssues('open')" class="tabBtn bg-gray-200 px-6 py-2 rounded">
                Open
            </button>

            <button id="closedBtn" onclick="filterIssues('closed')" class="tabBtn bg-gray-200 px-6 py-2 rounded">
                Closed
            </button>

        </div>
        </section>


        <!-- Issue Info -->
        <section class="max-w-6xl mx-auto mt-8 bg-white shadow p-4">
        <div class="flex justify-between items-center">

            <div class="flex gap-2 items-center">

                <img src="./Aperture.png" alt="">

                <h3 class="font-bold text-lg">
                    <span id="count">0</span> Issues
                </h3>

            </div>

            <div class="flex gap-4 text-sm">

                <p class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    Open
                </p>

                <p class="flex items-center gap-1">
                    <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    Closed
                </p>

            </div>

        </div>

    </section>


    <!-- Cards -->

    <section class="max-w-6xl mx-auto mt-6">

        <div id="issuesAllCard" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

        </div>

    </section>

    <script src="./js/script.js"></script>

</body>

</html>
